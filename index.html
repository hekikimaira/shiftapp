<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>交番シフト一覧</title>
<style>
:root{--bg:#0a0a0f;--s1:#151520;--s2:#1c1c2c;--bd:#2a2a3e;--tx:#e0e0ec;--dm:#6a6a7e;--ac:#4a9eff;--gn:#4ade80;--or:#fb923c;--rd:#f87171;--pr:#a78bfa;--yw:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh}
header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:12px 16px 8px}
header h1{font-size:17px;font-weight:700}
header .sub{font-size:11px;color:var(--dm);margin-top:2px}
.tabs{display:flex;border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--dm);cursor:pointer;border-bottom:2px solid transparent;background:none}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.page{display:none;padding-bottom:60px}.page.on{display:block}
.sec{font-size:12px;color:var(--dm);padding:14px 16px 6px;letter-spacing:.03em}
.box{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--dm);line-height:1.6;margin:0 16px 8px}
.pnl{padding:8px 16px;display:flex;flex-direction:column;gap:8px}
.rw{display:flex;gap:8px;align-items:center}
.rw label{font-size:13px;color:var(--dm);min-width:80px;flex-shrink:0}
.inp{flex:1;background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:8px 10px;font-size:15px;font-family:inherit;outline:none}
.inp:focus{border-color:var(--ac)}
textarea.inp{resize:vertical;min-height:80px;font-size:13px;line-height:1.5}
.btn{display:inline-flex;align-items:center;justify-content:center;background:var(--ac);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;touch-action:manipulation}
.btn:active{opacity:.7}
.btn.g2{background:var(--s2);border:1px solid var(--bd);color:var(--tx)}
.btn.sm{padding:7px 12px;font-size:12px}
.btn.warn{background:var(--or)}
.btn.full{width:100%}
.hidden{display:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:10px 20px;border-radius:8px;font-size:13px;z-index:300;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.ml{padding:8px 16px;display:flex;flex-direction:column;gap:4px}
.mi{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px}
.mi .nm{font-size:14px;font-weight:600;min-width:60px}
.mi .info{font-size:11px;color:var(--dm);flex:1}
.mi button{background:none;border:none;cursor:pointer;padding:4px;font-size:14px;color:var(--dm);touch-action:manipulation}
.mi .x{color:var(--rd);font-size:18px}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.chip{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.c-tom{background:rgba(251,146,60,.15);color:var(--or)}
.c-nik{background:rgba(74,158,255,.1);color:var(--ac)}
.c-rst{background:rgba(74,222,128,.12);color:var(--gn)}
.c-yob{background:rgba(251,191,36,.12);color:var(--yw)}
.add-row{display:flex;gap:6px;padding:8px 16px;align-items:center;flex-wrap:wrap}
.add-row .inp{width:64px;flex:none;text-align:center}
.add-row select,.sel-sm{background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:6px 8px;font-size:13px;font-family:inherit;-webkit-appearance:none;appearance:none}
.roster-wrap{overflow-x:auto;padding:8px;-webkit-overflow-scrolling:touch}
.roster{border-collapse:collapse;font-size:11px;min-width:100%}
.roster th,.roster td{border:1px solid var(--bd);padding:3px 2px;text-align:center;white-space:nowrap}
.roster thead th{background:var(--s2);position:sticky;top:0;z-index:2;font-weight:600}
.roster .date-row th{font-size:12px;padding:4px 2px}
.roster .dow-row th{font-size:10px;padding:2px;color:var(--dm)}
.roster .dow-row .sun{color:var(--rd)}.roster .dow-row .sat{color:var(--ac)}
.roster .name-cell{position:sticky;left:0;z-index:1;background:var(--s1);font-weight:600;font-size:12px;min-width:56px;max-width:72px;padding:4px 6px}
.roster td{min-width:28px;font-weight:700;font-size:12px;cursor:pointer;touch-action:manipulation}
.roster td:active{background:var(--s2)}
.roster td.work{color:var(--ac)}
.roster td.ake{color:var(--or)}
.roster td.off{color:var(--gn)}
.roster td.yobi{color:var(--yw)}
.roster td.edited{background:rgba(167,139,250,.12)}
.roster td.sun-col{background:rgba(248,113,113,.04)}
.roster td.sat-col{background:rgba(74,158,255,.04)}
.roster .today-col{background:rgba(74,158,255,.1)!important}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mo-in{background:var(--s1);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px 16px 32px;max-height:70dvh;overflow-y:auto}
.mo h3{font-size:15px;font-weight:700;margin-bottom:12px}
.mo-os{display:flex;flex-direction:column;gap:6px}
.mo-o{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;color:var(--tx);touch-action:manipulation}
.mo-o:active{background:var(--bd)}
.mo-o.sel{border-color:var(--ac);color:var(--ac)}
.empty{text-align:center;padding:40px 20px;color:var(--dm);font-size:14px;line-height:1.8}
.empty .ic{font-size:40px;margin-bottom:12px;opacity:.5}
.print-title{display:none}
@media print{
  body{background:#fff;color:#000;font-size:9px}
  header,.tabs,.page:not(.on),.no-print,.toast{display:none!important}
  .page.on{display:block!important}
  .roster-wrap{overflow:visible;padding:0}
  .roster{font-size:8px;width:100%}
  .roster th,.roster td{border:1px solid #999;padding:2px 1px}
  .roster thead th{background:#eee;color:#000}
  .roster .name-cell{background:#f5f5f5;color:#000}
  .roster td.work{color:#1a5fb4}.roster td.ake{color:#c64600}.roster td.off{color:#1a8a3f}.roster td.yobi{color:#9a6700}
  .roster td.edited{background:#ede9fe}
  .roster td.sun-col{background:#fff0f0}.roster td.sat-col{background:#f0f4ff}
  .roster .dow-row .sun{color:#c00}.roster .dow-row .sat{color:#1a5fb4}
  .print-title{display:block!important;text-align:center;font-size:14px;font-weight:700;margin-bottom:8px}
  @page{size:A4 landscape;margin:10mm}
}
</style>
</head>
<body>

<header>
  <h1>交番シフト一覧</h1>
  <div class="sub" id="hSub">パターン・メンバー未設定</div>
</header>
<div class="tabs" id="tabBar"></div>

<div class="page on" id="p-tbl">
  <div id="tblE" class="empty">
    <div class="ic">📊</div>
    メンバーとパターンを設定して<br>「一覧生成」してください
  </div>
  <div id="tblR" class="hidden">
    <div class="pnl no-print">
      <div class="rw">
        <label>年月</label>
        <input type="month" class="inp" id="inpMonth" value="2026-03">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn full" id="btnGen">一覧生成</button>
        <button class="btn g2" id="btnPrint" style="flex:none;width:80px">🖨 印刷</button>
      </div>
    </div>
    <div class="print-title" id="printTitle"></div>
    <div class="roster-wrap" id="rosterWrap"></div>
  </div>
</div>

<div class="page" id="p-mem">
  <div class="sec">メンバー管理</div>
  <div class="box">名前・開始日・開始行路を設定。全員同じ交番パターンで開始位置が異なります。</div>
  <div class="ml" id="memList"></div>
  <div class="sec">メンバー追加</div>
  <div class="add-row" id="addMemRow">
    <input class="inp" id="mName" placeholder="名前" style="width:80px">
    <input type="date" class="inp" id="mStart" value="2026-03-14" style="width:130px;flex:none">
    <select class="inp sel-sm" id="mRoute" style="width:80px;flex:none"></select>
    <button class="btn sm" id="btnAddMem">追加</button>
  </div>
</div>

<div class="page" id="p-pat">
  <div class="sec">交番パターン（全員共通）</div>
  <div class="box">泊まり→翌日「ー」自動挿入。土日で予備対象→「予」。</div>
  <div class="ml" id="rList"></div>
  <div class="sec">行路追加</div>
  <div class="add-row" id="addRouteRow">
    <input class="inp" id="aN" placeholder="番号" inputmode="numeric" style="width:60px">
    <select id="aT" class="sel-sm"><option value="0">日勤</option><option value="1">泊まり</option></select>
    <select id="aR" class="sel-sm"><option value="0">休なし</option><option value="1">◯×1</option><option value="2">◯×2</option><option value="3">◯×3</option></select>
    <label style="font-size:12px;color:var(--yw);display:flex;align-items:center;gap:3px">
      <input type="checkbox" id="aY" style="accent-color:var(--yw)">予
    </label>
    <button class="btn sm" id="btnAddRoute">追加</button>
  </div>
  <div class="sec">簡易入力</div>
  <div class="box">カンマ区切り。<code style="color:var(--or)">t</code>=泊　<code style="color:var(--gn)">r1</code>=公休1日　<code style="color:var(--yw)">y</code>=予備<br>例: <code style="color:var(--ac)">4, 1, 13tr1, 21tr1</code></div>
  <div class="pnl">
    <textarea class="inp" id="qArea" placeholder="4, 1, 13tr1, 21tr1, 14tr1, 19, 3y..."></textarea>
    <button class="btn full" id="btnQuick">簡易読み込み</button>
  </div>
</div>

<div class="page" id="p-io">
  <div class="sec">エクスポート</div>
  <div class="pnl">
    <button class="btn g2 full" id="btnExport">JSONファイルをダウンロード</button>
  </div>
  <div class="sec">インポート</div>
  <div class="pnl">
    <input type="file" accept=".json" id="impFile" class="inp" style="padding:10px">
    <button class="btn full" id="btnImport">JSONから読み込み</button>
  </div>
</div>

<div class="mo hidden" id="modal">
  <div class="mo-in" id="modalC"></div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  // ===== STATE =====
  var PAT = [];
  var MEM = [];
  var EDITS = {};

  // ===== HELPERS =====
  function $(id){ return document.getElementById(id); }
  function dk(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function toast(msg){ var t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show')},2000); }

  // ===== EXPAND PATTERN =====
  function expand(){
    var d=[];
    for(var i=0;i<PAT.length;i++){
      var p=PAT[i];
      d.push({type:'work',label:String(p.num),route:p.num});
      if(p.tomari) d.push({type:'ake',label:'ー',route:p.num});
      for(var j=0;j<p.rest;j++) d.push({type:'off',label:'◯',route:null});
    }
    return d;
  }

  // ===== GET SHIFT =====
  function getShift(mi, dateStr){
    var ek=mi+':'+dateStr;
    if(EDITS[ek]) return {label:EDITS[ek].label, type:EDITS[ek].type, edited:true};
    var m=MEM[mi];
    var days=expand();
    if(!days.length) return null;
    var start=new Date(m.startDate+'T00:00:00');
    var target=new Date(dateStr+'T00:00:00');
    var diff=Math.round((target-start)/86400000);
    if(diff<0) return null;
    var off=0;
    var tn=(PAT[m.startRouteIdx]||PAT[0]).num;
    for(var i=0;i<days.length;i++){
      if(days[i].type==='work'&&days[i].route===tn){off=i;break;}
    }
    var pi=((off+diff)%days.length+days.length)%days.length;
    var p=days[pi];
    var dow=target.getDay();
    var ySet={};
    for(var k=0;k<PAT.length;k++){if(PAT[k].yobi)ySet[PAT[k].num]=true;}
    var label=p.label, type=p.type;
    if((dow===0||dow===6)&&p.type==='work'&&ySet[p.route]){label='予';type='yobi';}
    return {label:label,type:type,edited:false};
  }

  // ===== GENERATE TABLE =====
  var curMonth='2026-03';
  function genTable(){
    if(!PAT.length||!MEM.length){toast('パターンとメンバーを設定してください');return;}
    curMonth=$('inpMonth').value;
    var parts=curMonth.split('-');
    var y=parseInt(parts[0]),m=parseInt(parts[1]);
    var dim=new Date(y,m,0).getDate();
    var today=dk(new Date());
    $('printTitle').textContent=y+'年'+m+'月 勤務一覧表';
    var dowN=['日','月','火','水','木','金','土'];
    var h='<table class="roster"><thead><tr class="date-row"><th rowspan="2" style="min-width:56px">氏名</th>';
    for(var d=1;d<=dim;d++){
      var ds=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      h+='<th'+(ds===today?' class="today-col"':'')+'>'+d+'</th>';
    }
    h+='</tr><tr class="dow-row">';
    for(var d=1;d<=dim;d++){
      var date=new Date(y,m-1,d);
      var dow=date.getDay();
      var ds=dk(date);
      var cls=dow===0?'sun':dow===6?'sat':'';
      h+='<th class="'+cls+(ds===today?' today-col':'')+'">'+dowN[dow]+'</th>';
    }
    h+='</tr></thead><tbody>';
    for(var mi=0;mi<MEM.length;mi++){
      h+='<tr><td class="name-cell">'+esc(MEM[mi].name)+'</td>';
      for(var d=1;d<=dim;d++){
        var date=new Date(y,m-1,d);
        var ds=dk(date);
        var dow=date.getDay();
        var shift=getShift(mi,ds);
        var cls=shift?shift.type:'';
        if(shift&&shift.edited)cls+=' edited';
        if(dow===0)cls+=' sun-col';
        if(dow===6)cls+=' sat-col';
        if(ds===today)cls+=' today-col';
        var label=shift?shift.label:'';
        h+='<td class="'+cls+'" data-mi="'+mi+'" data-ds="'+ds+'">'+label+'</td>';
      }
      h+='</tr>';
    }
    h+='</tbody></table>';
    $('rosterWrap').innerHTML=h;

    // Attach click events via delegation
    $('rosterWrap').onclick=function(e){
      var td=e.target.closest('td[data-mi]');
      if(td) editCell(parseInt(td.dataset.mi), td.dataset.ds);
    };
  }

  // ===== EDIT CELL =====
  function editCell(mi,ds){
    var modal=$('modal'),c=$('modalC');
    var nums={};
    for(var i=0;i<PAT.length;i++) nums[PAT[i].num]=true;
    var numList=Object.keys(nums).map(Number);
    var opts=[];
    for(var i=0;i<numList.length;i++) opts.push({l:String(numList[i]),t:'work'});
    opts.push({l:'ー',t:'ake'});
    opts.push({l:'◯',t:'off'});
    opts.push({l:'予',t:'yobi'});
    var cur=getShift(mi,ds);
    var h='<h3>'+esc(MEM[mi].name)+' — '+ds+'</h3><div class="mo-os">';
    for(var i=0;i<opts.length;i++){
      var o=opts[i];
      var sel=(cur&&cur.label===o.l)?' sel':'';
      h+='<div class="mo-o'+sel+'" data-l="'+esc(o.l)+'" data-t="'+o.t+'">'+esc(o.l)+'</div>';
    }
    var ek=mi+':'+ds;
    if(EDITS[ek]){
      h+='<div class="mo-o" data-action="reset" style="color:var(--dm);margin-top:8px">元に戻す</div>';
    }
    h+='</div>';
    c.innerHTML=h;
    modal.classList.remove('hidden');

    c.onclick=function(e){
      var el=e.target.closest('.mo-o');
      if(!el)return;
      if(el.dataset.action==='reset'){
        delete EDITS[ek];
      } else {
        EDITS[ek]={label:el.dataset.l,type:el.dataset.t};
      }
      modal.classList.add('hidden');
      genTable();
    };
    modal.onclick=function(e){
      if(e.target===modal) modal.classList.add('hidden');
    };
  }

  // ===== PATTERN OPS =====
  function addRoute(){
    var num=parseInt($('aN').value);
    if(isNaN(num))return;
    PAT.push({num:num,tomari:$('aT').value==='1',rest:parseInt($('aR').value),yobi:$('aY').checked});
    $('aN').value='';$('aY').checked=false;
    save();render();
  }
  function removeRoute(i){PAT.splice(i,1);save();render();}
  function moveRoute(i,d){var j=i+d;if(j<0||j>=PAT.length)return;var tmp=PAT[i];PAT[i]=PAT[j];PAT[j]=tmp;save();render();}

  function doQuick(){
    var raw=$('qArea').value.trim();
    if(!raw)return;
    var items=raw.split(/[,、\s]+/).filter(Boolean);
    var result=[];
    for(var i=0;i<items.length;i++){
      var mt=items[i].match(/^(\d+)(t?)(r(\d))?(y?)$/);
      if(!mt){toast('解析エラー: "'+items[i]+'"');return;}
      result.push({num:parseInt(mt[1]),tomari:mt[2]==='t',rest:mt[4]?parseInt(mt[4]):0,yobi:mt[5]==='y'});
    }
    PAT=result;save();render();
    toast(PAT.length+'行路 読み込み完了');
  }

  // ===== MEMBER OPS =====
  function addMember(){
    var name=$('mName').value.trim();
    if(!name){toast('名前を入力');return;}
    MEM.push({name:name,startDate:$('mStart').value,startRouteIdx:parseInt($('mRoute').value)||0});
    $('mName').value='';
    save();render();
  }
  function removeMember(i){MEM.splice(i,1);save();render();}
  function moveMember(i,d){var j=i+d;if(j<0||j>=MEM.length)return;var tmp=MEM[i];MEM[i]=MEM[j];MEM[j]=tmp;save();render();}

  // ===== RENDER =====
  function render(){
    renderRL();renderML();updateSel();updateH();
    if(PAT.length&&MEM.length){$('tblE').classList.add('hidden');$('tblR').classList.remove('hidden');}
    else{$('tblE').classList.remove('hidden');$('tblR').classList.add('hidden');}
  }

  function updateH(){
    var s=$('hSub'),parts=[];
    if(PAT.length){parts.push(PAT.length+'行路/'+expand().length+'日周期');}
    if(MEM.length){parts.push(MEM.length+'名');}
    s.textContent=parts.length?parts.join(' · '):'パターン・メンバー未設定';
  }

  function updateSel(){
    var sel=$('mRoute');
    sel.innerHTML=PAT.length
      ?PAT.map(function(p,i){return '<option value="'+i+'">'+p.num+'</option>';}).join('')
      :'<option value="0">—</option>';
  }

  function renderML(){
    var el=$('memList');
    if(!MEM.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--dm)">メンバーなし</div>';return;}
    el.innerHTML=MEM.map(function(m,i){
      var rName=PAT[m.startRouteIdx]?PAT[m.startRouteIdx].num:'?';
      return '<div class="mi"><div class="nm">'+esc(m.name)+'</div><div class="info">開始:'+m.startDate+' / 行路'+rName+'</div>'
        +'<button data-action="mm" data-i="'+i+'" data-d="-1">▲</button>'
        +'<button data-action="mm" data-i="'+i+'" data-d="1">▼</button>'
        +'<button class="x" data-action="rm" data-i="'+i+'">✕</button></div>';
    }).join('');
  }

  function renderRL(){
    var el=$('rList');
    if(!PAT.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--dm)">パターン未設定</div>';return;}
    el.innerHTML=PAT.map(function(p,i){
      var tags=p.tomari?'<span class="chip c-tom">泊</span>':'<span class="chip c-nik">日勤</span>';
      if(p.rest)tags+='<span class="chip c-rst">◯×'+p.rest+'</span>';
      if(p.yobi)tags+='<span class="chip c-yob">休日予</span>';
      return '<div class="mi"><div class="nm" style="color:var(--ac)">'+p.num+'</div><div class="chips">'+tags+'</div>'
        +'<button data-action="mr" data-i="'+i+'" data-d="-1">▲</button>'
        +'<button data-action="mr" data-i="'+i+'" data-d="1">▼</button>'
        +'<button class="x" data-action="rr" data-i="'+i+'">✕</button></div>';
    }).join('');
  }

  // ===== IO =====
  function doExport(){
    if(!PAT.length&&!MEM.length){toast('データなし');return;}
    var data=JSON.stringify({pattern:PAT,members:MEM,edits:EDITS},null,2);
    var blob=new Blob([data],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='交番シフト_'+dk(new Date())+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    toast('ダウンロード完了');
  }

  function doImport(){
    var file=$('impFile').files[0];
    if(!file){toast('ファイルを選択');return;}
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var d=JSON.parse(e.target.result);
        if(d.pattern) PAT=d.pattern.map(function(x){return {num:parseInt(x.num),tomari:!!x.tomari,rest:parseInt(x.rest)||0,yobi:!!x.yobi};});
        if(d.members) MEM=d.members.map(function(x){return {name:x.name,startDate:x.startDate,startRouteIdx:parseInt(x.startRouteIdx)||0};});
        if(d.edits) EDITS=d.edits;
        save();render();
        toast('読み込み完了: '+PAT.length+'行路 / '+MEM.length+'名');
      }catch(err){
        toast('JSONエラー: '+err);
      }
    };
    reader.readAsText(file);
  }

  // ===== PERSISTENCE =====
  function save(){
    try{localStorage.setItem('shift_data',JSON.stringify({p:PAT,m:MEM,e:EDITS}));}catch(e){}
  }
  function load(){
    try{
      var raw=localStorage.getItem('shift_data');
      if(raw){
        var d=JSON.parse(raw);
        if(d.p)PAT=d.p;if(d.m)MEM=d.m;if(d.e)EDITS=d.e;
      }
    }catch(e){}
  }

  // ===== TABS =====
  var tabDefs=[
    {id:'tbl',label:'一覧表'},
    {id:'mem',label:'メンバー'},
    {id:'pat',label:'パターン'},
    {id:'io',label:'入出力'}
  ];
  var tabBar=$('tabBar');
  tabBar.innerHTML=tabDefs.map(function(t,i){
    return '<div class="tab'+(i===0?' on':'')+'" data-t="'+t.id+'">'+t.label+'</div>';
  }).join('');

  tabBar.addEventListener('click',function(e){
    var tab=e.target.closest('.tab');
    if(!tab)return;
    tabBar.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
    tab.classList.add('on');
    $('p-'+tab.dataset.t).classList.add('on');
  });

  // ===== EVENT DELEGATION =====
  // Table buttons
  $('btnGen').addEventListener('click', genTable);
  $('btnPrint').addEventListener('click', function(){ window.print(); });
  $('btnAddMem').addEventListener('click', addMember);
  $('btnAddRoute').addEventListener('click', addRoute);
  $('btnQuick').addEventListener('click', doQuick);
  $('btnExport').addEventListener('click', doExport);
  $('btnImport').addEventListener('click', doImport);

  // Member list delegation
  $('memList').addEventListener('click',function(e){
    var btn=e.target.closest('button[data-action]');
    if(!btn)return;
    var i=parseInt(btn.dataset.i);
    if(btn.dataset.action==='mm') moveMember(i,parseInt(btn.dataset.d));
    if(btn.dataset.action==='rm') removeMember(i);
  });

  // Route list delegation
  $('rList').addEventListener('click',function(e){
    var btn=e.target.closest('button[data-action]');
    if(!btn)return;
    var i=parseInt(btn.dataset.i);
    if(btn.dataset.action==='mr') moveRoute(i,parseInt(btn.dataset.d));
    if(btn.dataset.action==='rr') removeRoute(i);
  });

  // ===== INIT =====
  load();
  render();

})();
</script>
</body>
</html>
